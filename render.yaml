services:
  - type: web
    name: hanilink-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build:server
    startCommand: npm run start:api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_URL
        value: https://hanilink-api.onrender.com
      - key: APP_DIST_PATH
        value: ./dist
      - key: DESKTOP_EMBEDDED
        value: "0"
      - key: SKIP_MONGO_MEMORY
        value: "1"
      - key: CORS_ALLOWED_ORIGINS
        value: https://hanilink.ma,https://app.hanilink.ma,http://localhost:5000
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
